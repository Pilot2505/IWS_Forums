services:

  mysql:
    image: mysql:8.0
    container_name: sqa-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: SQA
    ports:
      - "3306:3306"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql

  server:
    build: ./server
    container_name: sqa-server
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: SQA

  client:
    build: ./client
    container_name: sqa-client
    ports:
      - "8080:8080"
    depends_on:
      - server

volumes:
  mysql_data: