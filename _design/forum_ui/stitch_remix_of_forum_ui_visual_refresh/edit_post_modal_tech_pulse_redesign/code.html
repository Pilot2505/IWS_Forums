<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Post - Tech Pulse</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

          extend: {

                    "surface": "#f8f9fa",
                    "surface-container-low": "#f3f4f5",
                    "tertiary-container": "#a06900",
                    "on-tertiary-fixed": "#291800",
                    "surface-variant": "#e1e3e4",
                    "background": "#f8f9fa",
                    "on-error": "#ffffff",
                    "on-primary-fixed-variant": "#004883",
                    "secondary-container": "#c1d9fe",
                    "on-secondary-fixed-variant": "#314867",
                    "on-primary-fixed": "#001c39",
                    "primary-fixed-dim": "#a4c9ff",
                    "tertiary-fixed-dim": "#ffb953",
                    "surface-tint": "#0060ac",
                    "on-tertiary-container": "#fffbff",
                    "on-primary": "#ffffff",
                    "tertiary": "#7f5300",
                    "secondary": "#496080",
                    "outline-variant": "#c1c7d3",
                    "surface-container": "#edeeef",
                    "on-secondary": "#ffffff",
                    "inverse-on-surface": "#f0f1f2",
                    "error-container": "#ffdad6",
                    "on-primary-container": "#fdfcff",
                    "secondary-fixed": "#d4e3ff",
                    "on-tertiary-fixed-variant": "#633f00",
                    "surface-bright": "#f8f9fa",
                    "inverse-primary": "#a4c9ff",
                    "inverse-surface": "#2e3132",
                    "primary-container": "#2976c7",
                    "on-background": "#191c1d",
                    "tertiary-fixed": "#ffddb4",
                    "surface-container-lowest": "#ffffff",
                    "primary": "#005da7",
                    "surface-dim": "#d9dadb",
                    "primary-fixed": "#d4e3ff",
                    "secondary-fixed-dim": "#b1c8ed"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "base": "8px",
                    "xl": "32px",
                    "sm": "8px",
                    "xs": "4px",
                    "lg": "24px",
                    "md": "16px"
            },
            "fontFamily": {
                    "headline-lg": [
                            "Inter"
                    ],
                    "body-lg": [
                            "Inter"
                    ],
                    "label-md": [

                    "headline-md": [

                    ]
            },
            "fontSize": {
                    "headline-lg": [
                            "32px",

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex items-center justify-center font-body-lg text-body-lg">
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-inverse-surface/40 backdrop-blur-sm z-40 flex items-center justify-center p-md">
<!-- Modal Dialog -->
<div class="bg-surface-container-lowest w-full max-w-2xl rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] flex flex-col max-h-[795px] overflow-hidden z-50">
<!-- Header -->
<div class="px-lg py-md border-b border-surface-variant flex justify-between items-center bg-surface-container-lowest shrink-0">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Edit Post</h2>
<p class="font-label-md text-label-md text-on-surface-variant mt-xs">Changes are applied only when you save.</p>
</div>
<button aria-label="Close modal" class="text-on-surface-variant hover:bg-surface-container hover:text-on-surface p-sm rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Body -->
<div class="p-lg overflow-y-auto flex-1 bg-surface-container-lowest">
<form class="flex flex-col gap-lg">
<!-- Title Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="post-title">Title</label>
<input class="w-full px-md py-sm border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface font-body-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow placeholder:text-on-surface-variant/60" id="post-title" placeholder="Enter post title" type="text" value="The Future of UI Development"/>
</div>
<!-- Tags Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="post-tags">Tags</label>
<input class="w-full px-md py-sm border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface font-body-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow placeholder:text-on-surface-variant/60" id="post-tags" placeholder="Enter tags separated by commas" type="text" value="React, performance, UI"/>
<p class="font-label-md text-label-md text-on-surface-variant mt-1">Add multiple tags with commas. Example: React, performance, UI.</p>
</div>
<!-- Content Editor -->
<div class="flex flex-col gap-xs flex-1 min-h-[300px]">
<label class="font-label-md text-label-md text-on-surface">Content</label>
<div class="border border-outline-variant rounded-lg flex flex-col flex-1 overflow-hidden bg-surface-container-lowest">
<!-- Toolbar -->
<div class="flex flex-wrap items-center gap-sm p-sm border-b border-outline-variant bg-surface-container-low shrink-0">
<button class="p-sm text-on-surface-variant hover:bg-surface-container-high rounded-md transition-colors" title="Bold" type="button"><span class="material-symbols-outlined text-[20px]" data-icon="format_bold">format_bold</span></button>
<button class="p-sm text-on-surface-variant hover:bg-surface-container-high rounded-md transition-colors" title="Italic" type="button"><span class="material-symbols-outlined text-[20px]" data-icon="format_italic">format_italic</span></button>
<button class="p-sm text-on-surface-variant hover:bg-surface-container-high rounded-md transition-colors" title="Underline" type="button"><span class="material-symbols-outlined text-[20px]" data-icon="format_underlined">format_underlined</span></button>
<div class="w-px h-6 bg-outline-variant mx-xs"></div>
<button class="p-sm text-on-surface-variant hover:bg-surface-container-high rounded-md transition-colors" title="Link" type="button"><span class="material-symbols-outlined text-[20px]" data-icon="link">link</span></button>
<button class="p-sm text-on-surface-variant hover:bg-surface-container-high rounded-md transition-colors" title="Image" type="button"><span class="material-symbols-outlined text-[20px]" data-icon="image">image</span></button>
<div class="w-px h-6 bg-outline-variant mx-xs"></div>
<button class="p-sm text-on-surface-variant hover:bg-surface-container-high rounded-md transition-colors" title="Bulleted List" type="button"><span class="material-symbols-outlined text-[20px]" data-icon="format_list_bulleted">format_list_bulleted</span></button>
<button class="p-sm text-on-surface-variant hover:bg-surface-container-high rounded-md transition-colors" title="Numbered List" type="button"><span class="material-symbols-outlined text-[20px]" data-icon="format_list_numbered">format_list_numbered</span></button>
</div>
<!-- Editor Area -->
<textarea class="w-full flex-1 p-md bg-surface-container-lowest text-on-surface font-body-lg resize-none focus:outline-none border-none placeholder:text-on-surface-variant/60" id="post-content" placeholder="Write your post content here...">As modern web applications grow in complexity, managing UI state efficiently becomes a primary concern for developers. We've recently evaluated our approach to rendering heavy data grids...</textarea>
</div>
</div>
</form>
</div>
<!-- Footer -->
<div class="px-lg py-md border-t border-surface-variant flex justify-end gap-md bg-surface-container-low shrink-0">
<button class="px-lg py-sm font-label-md text-label-md text-primary bg-transparent hover:bg-primary/10 rounded-lg transition-colors" type="button">Cancel</button>
<button class="px-lg py-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-primary/90 rounded-lg shadow-sm transition-colors" type="button">Save</button>
</div>
</div>
</div>
</body></html>
