<body class="bg-[#ebf2fa] min-h-screen flex flex-col items-center justify-center font-body-lg text-on-surface">
<!-- Top Navigation (Suppressed as per rules, but TopAppBar JSON requested execution) -->
<!-- Executing JSON TopAppBar as a simple header layout since it's a linear transactional page -->
<header class="w-full top-0 flex justify-between items-center px-6 py-4 max-w-7xl mx-auto absolute top-0 left-0 right-0">
<div class="text-xl font-bold text-slate-900 dark:text-slate-50 font-headline-md text-primary">Tech Pulse</div>
<a class="text-blue-600 dark:text-blue-400 font-inter text-sm font-medium hover:text-blue-700 dark:hover:text-blue-300 transition-colors cursor-pointer active:opacity-70 font-label-md text-primary hover:underline flex items-center gap-xs" href="#">
            Back to login
        </a>
</header>
<main class="w-full max-w-md px-lg w-full flex flex-col items-center mt-xl pt-xl">
<h1 class="font-headline-lg text-on-surface mb-lg text-center w-full">Reset Password</h1>
<div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/30 p-lg w-full mb-lg">
<p class="font-body-lg text-on-surface-variant mb-lg text-center leading-relaxed">
                Enter your email or username and we will send a secure reset link. The link expires in 1 hour.
            </p>
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-on-surface-variant" for="emailOrUsername">Email or Username</label>
<input class="w-full border border-outline-variant rounded-lg px-md py-sm font-body-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="emailOrUsername" placeholder="name@example.com" type="text"/>
</div>
<button class="w-full bg-primary text-on-primary rounded-lg py-sm px-md font-label-md hover:bg-primary-container hover:text-on-primary-container transition-colors shadow-sm mt-sm" type="button">
                    Send reset link
                </button>
</form>
</div>
<div class="font-body-lg text-on-surface-variant text-center">
            Remembered your password? <a class="font-label-md text-primary hover:underline" href="#">Login</a>
</div>
</main>
