<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - The Digital Atelier</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "surface": "#f8f9fa",
                "error-container": "#ffdad6",
                "surface-tint": "#0060ac",
                "outline": "#717783",
                "primary": "#005da7",
                "surface-container-lowest": "#ffffff",
                "on-primary": "#ffffff",
                "inverse-surface": "#2e3132",
                "on-error": "#ffffff",
                "background": "#f8f9fa",
                "surface-bright": "#f8f9fa",
                "surface-container-highest": "#e1e3e4",
                "error": "#ba1a1a",
                "on-secondary-fixed-variant": "#314867",
                "surface-variant": "#e1e3e4",
                "outline-variant": "#c1c7d3",
                "on-primary-fixed": "#001c39",
                "on-error-container": "#93000a",
                "on-tertiary-fixed": "#291800",
                "on-surface": "#191c1d",
                "on-tertiary": "#ffffff",
                "on-surface-variant": "#414751",
                "tertiary-fixed": "#ffddb4",
                "surface-container": "#edeeef",
                "on-secondary-fixed": "#001c39",
                "tertiary-fixed-dim": "#ffb953",
                "on-tertiary-container": "#fffbff",
                "secondary-fixed-dim": "#b1c8ed",
                "on-secondary": "#ffffff",
                "inverse-primary": "#a4c9ff",
                "tertiary": "#7f5300",
                "secondary-container": "#c1d9fe",
                "on-background": "#191c1d",
                "surface-container-high": "#e7e8e9",
                "secondary": "#496080",
                "surface-container-low": "#f3f4f5",
                "tertiary-container": "#a06900",
                "inverse-on-surface": "#f0f1f2",
                "surface-dim": "#d9dadb",
                "on-tertiary-fixed-variant": "#633f00",
                "secondary-fixed": "#d4e3ff",
                "primary-fixed-dim": "#a4c9ff",
                "on-secondary-container": "#485e7e",
                "on-primary-fixed-variant": "#004883",
                "primary-container": "#2976c7",
                "primary-fixed": "#d4e3ff",
                "on-primary-container": "#fdfcff"
        },
        "borderRadius": {
                "DEFAULT": "0.125rem",
                "lg": "0.25rem",
                "xl": "0.5rem",
                "full": "0.75rem"
        },
        "spacing": {},
        "fontFamily": {
                "headline": [
                        "Inter", "sans-serif"
                ],
                "display": [
                        "Inter", "sans-serif"
                ],
                "body": [
                        "Inter", "sans-serif"
                ],
                "label": [
                        "Inter", "sans-serif"
                ]
        },
        "fontSize": {}
},
    },
  }
</script>
<style>
  body {
    font-family: 'Inter', sans-serif;
  }
</style>
</head>
<body class="text-[#191c1d] min-h-screen flex flex-col font-body antialiased bg-[#e6ebf5]">
<!-- Main Content Container -->
<div class="relative z-10 flex-grow flex flex-col min-h-screen">
<!-- Top Nav Minimal -->
<header class="w-full px-8 py-6 flex items-center justify-between absolute top-0 left-0 z-10">
<a class="text-xl font-bold tracking-tight text-[#001c39]" href="#">The Digital Atelier</a>
<a class="text-sm font-medium text-[#485e7e] hover:text-[#001c39] transition-colors" href="#">Register</a>
</header>
<!-- Login Canvas -->
<main class="flex-grow flex items-center justify-center px-4 py-24">
<div class="w-full max-w-md">
<!-- Header -->
<div class="text-center mb-10">
<h1 class="text-[2.5rem] font-bold text-[#001c39] tracking-tight leading-tight">Welcome Back</h1>
<p class="text-[#485e7e] mt-2 font-medium">Sign in to continue your curated pulse.</p>
</div>
<!-- Form Container -->
<div class="bg-white/80 backdrop-blur-md p-10 rounded-2xl shadow-[0_8px_32px_rgba(0,0,0,0.06)] border border-white/50">
<form class="flex flex-col gap-6">
<!-- Email / Username -->
<div class="flex flex-col gap-2">
<label class="text-xs font-semibold text-[#314867] tracking-wide uppercase" for="email">Email or Username</label>
<input class="w-full px-4 py-3 rounded-xl border border-[#c1d9fe] bg-white/50 focus:bg-white focus:border-[#005da7] focus:ring-2 focus:ring-[#005da7]/20 outline-none transition-all text-sm placeholder:text-[#717783] text-[#191c1d]" id="email" name="email" placeholder="Enter your credentials" type="text"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-xs font-semibold text-[#314867] tracking-wide uppercase" for="password">Password</label>
<a class="text-xs font-medium text-[#005da7] hover:text-[#004883] transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full px-4 py-3 rounded-xl border border-[#c1d9fe] bg-white/50 focus:bg-white focus:border-[#005da7] focus:ring-2 focus:ring-[#005da7]/20 outline-none transition-all text-sm placeholder:text-[#717783] text-[#191c1d] pr-16" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-semibold text-[#005da7] hover:text-[#004883] transition-colors focus:outline-none" type="button">
Show
</button>
</div>
</div>
<!-- Action -->
<button class="mt-4 w-full bg-[#005da7] hover:bg-[#004883] text-white font-semibold py-3.5 rounded-xl transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5" type="submit">
              Login
</button>
<!-- Footer Link -->
<div class="text-center border-t border-[#e1e3e4] mt-4 pt-4">
<p class="text-sm text-[#485e7e]">
            Don't have an account? 
            <a class="text-[#005da7] hover:text-[#004883] font-semibold hover:underline" href="#">Register here</a>
</p>
</div>
</form>
</div>
</div>
</main>
</div>
</body></html>
