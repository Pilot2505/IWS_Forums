<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tech Pulse - Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        fontFamily: {
          headline: ["Inter", "sans-serif"],
          display: ["Inter", "sans-serif"],
          body: ["Inter", "sans-serif"],
          label: ["Inter", "sans-serif"]
        }
      }
    }
  }
</script>
<style>
    body { font-family: 'Inter', sans-serif; }
</style>
</head>
<body class="text-[#191c1d] min-h-screen flex flex-col font-body antialiased bg-[#e6ebf5]">
<!-- Header -->
<header class="w-full px-8 py-6 flex items-center justify-between absolute top-0 left-0 z-10">
<a class="text-xl font-bold tracking-tight text-[#001c39]" href="#">Tech Pulse</a>
<a class="text-sm font-medium text-[#485e7e] hover:text-[#001c39] transition-colors" href="#">Login</a>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center px-4 py-24">
<div class="w-full max-w-md">
<div class="text-center mb-10">
<h1 class="text-[2.5rem] font-bold text-[#001c39] tracking-tight leading-tight">Create an Account</h1>
<p class="text-[#485e7e] mt-2 font-medium">Join Tech Pulse today.</p>
</div>
<div class="bg-white/80 backdrop-blur-md p-10 rounded-2xl shadow-[0_8px_32px_rgba(0,0,0,0.06)] border border-white/50">
<form class="flex flex-col gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-[#314867] tracking-wide uppercase text-xs" for="email">Email</label>
<input class="w-full px-4 py-3 rounded-xl border border-[#c1d9fe] bg-white/50 focus:bg-white focus:border-[#005da7] focus:ring-2 focus:ring-[#005da7]/20 outline-none transition-all text-sm placeholder:text-[#717783] text-[#191c1d]" id="email" placeholder="email@email.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-[#314867] tracking-wide uppercase text-xs" for="username">Username</label>
<input class="w-full px-4 py-3 rounded-xl border border-[#c1d9fe] bg-white/50 focus:bg-white focus:border-[#005da7] focus:ring-2 focus:ring-[#005da7]/20 outline-none transition-all text-sm placeholder:text-[#717783] text-[#191c1d]" id="username" placeholder="Choose a username" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-[#314867] tracking-wide uppercase text-xs" for="fullname">Full Name</label>
<input class="w-full px-4 py-3 rounded-xl border border-[#c1d9fe] bg-white/50 focus:bg-white focus:border-[#005da7] focus:ring-2 focus:ring-[#005da7]/20 outline-none transition-all text-sm placeholder:text-[#717783] text-[#191c1d]" id="fullname" placeholder="Your full name" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-[#314867] tracking-wide uppercase text-xs" for="password">Password</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-xl border border-[#c1d9fe] bg-white/50 focus:bg-white focus:border-[#005da7] focus:ring-2 focus:ring-[#005da7]/20 outline-none transition-all text-sm placeholder:text-[#717783] text-[#191c1d] pr-16" id="password" placeholder="Create a password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-semibold text-[#005da7] hover:text-[#004883] transition-colors" type="button">Show</button>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-[#314867] tracking-wide uppercase text-xs" for="confirm-password">Confirm Password</label>
<input class="w-full px-4 py-3 rounded-xl border border-[#c1d9fe] bg-white/50 focus:bg-white focus:border-[#005da7] focus:ring-2 focus:ring-[#005da7]/20 outline-none transition-all text-sm placeholder:text-[#717783] text-[#191c1d]" id="confirm-password" placeholder="Re-enter password" type="password"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-[#314867] tracking-wide uppercase text-xs" for="profile-pic">Profile Picture <span class="font-normal text-[#717783] lowercase">(optional)</span></label>
<input class="w-full text-sm text-[#485e7e] file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-[#eef2ff] file:text-[#005da7] hover:file:bg-[#d4e3ff] transition-all border border-[#c1d9fe] bg-white/50 rounded-xl p-1.5 focus:outline-none focus:ring-2 focus:ring-[#005da7]/20" id="profile-pic" type="file"/>
</div>
<button class="mt-4 w-full bg-[#005da7] hover:bg-[#004883] text-white font-semibold py-3.5 rounded-xl transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5" type="submit">
                        Register
                    </button>
<div class="text-center border-t border-[#e1e3e4] mt-4 pt-4">
<p class="text-sm text-[#485e7e]">
        Already have an account? <a class="text-[#005da7] hover:text-[#004883] font-semibold hover:underline" href="#">Login</a>
</p>
</div>
</form>
</div>
</div>
</main>
</body></html>
