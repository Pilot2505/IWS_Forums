<body class="bg-secondary-fixed min-h-screen flex flex-col items-center justify-center p-lg md:p-xl font-body-lg text-on-surface antialiased relative overflow-hidden">
<!-- Decorative background elements -->
<div aria-hidden="true" class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
<div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-primary/5 blur-3xl"></div>
<div class="absolute bottom-[10%] -right-[10%] w-[50%] h-[50%] rounded-full bg-secondary-container/30 blur-3xl"></div>
</div>
<!-- Main Content Canvas -->
<main class="w-full max-w-md relative z-10 flex flex-col items-center">
<!-- Brand Signature -->
<div class="mb-lg flex items-center justify-center space-x-base">
<span aria-hidden="true" class="material-symbols-outlined text-primary text-[28px] font-bold" style="font-variation-settings: 'FILL' 1;">
                graphic_eq
            </span>
<span class="font-headline-md text-headline-md text-on-surface tracking-tight">Tech Pulse</span>
</div>
<!-- Deletion Card -->
<div class="w-full bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-lg md:p-xl flex flex-col items-center text-center">
<!-- Icon/Alert -->
<div class="w-16 h-16 rounded-full bg-error-container text-on-error-container flex items-center justify-center mb-lg">
<span aria-hidden="true" class="material-symbols-outlined text-[32px]">
                    warning
                </span>
</div>
<!-- Header Content -->
<h1 class="font-headline-md text-headline-md text-on-surface mb-base w-full">
                Confirm account deletion
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-xl w-full max-w-[320px]">
                Enter your password to confirm that you want to delete your account. Your account will be deleted after 7 days.
            </p>
<!-- Form -->
<form class="w-full flex flex-col gap-lg text-left">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative w-full">
<input class="w-full h-12 px-md py-base border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface font-body-lg text-body-lg focus:ring-2 focus:ring-primary focus:border-primary transition-shadow placeholder:text-outline" id="password" name="password" placeholder="Enter your current password" required="" type="password"/>
</div>
</div>
<div class="flex flex-col gap-base mt-sm">
<button class="w-full h-12 bg-error text-on-error font-label-md text-label-md rounded-lg flex items-center justify-center transition-colors hover:bg-error/90 active:bg-error focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-error shadow-sm" type="submit">
                        Confirm deletion
                    </button>
<button class="w-full h-12 bg-transparent text-primary font-label-md text-label-md rounded-lg flex items-center justify-center transition-colors hover:bg-surface-container-low active:bg-surface-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary border border-transparent" type="button">
                        Cancel
                    </button>
</div>
</form>
</div>
</main>
