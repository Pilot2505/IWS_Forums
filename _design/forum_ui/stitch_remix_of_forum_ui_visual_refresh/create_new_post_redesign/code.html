<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create New Post - Tech Pulse</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            theme: {

                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#d4e3ff",
                        "on-tertiary-fixed": "#291800",

                        "on-secondary-container": "#485e7e",
                        "on-primary-fixed-variant": "#004883",
                        "on-secondary-fixed-variant": "#314867",
                        "on-error-container": "#93000a",

                        "outline-variant": "#c1c7d3",

                    "borderRadius": {

                    "spacing": {
                        "xl": "32px",
                        "md": "16px",
                        "base": "8px",
                        "lg": "24px",
                        "xs": "4px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-lg text-body-lg">
<!-- TopAppBar -->
<header class="bg-white dark:bg-gray-900 font-['Inter'] text-sm antialiased fixed top-0 w-full z-50 border-b border-gray-100 dark:border-gray-800 shadow-sm dark:shadow-none">
<div class="flex justify-between items-center h-16 px-6 max-w-full mx-auto">
<div class="flex items-center gap-2 text-blue-600 dark:text-blue-400">
<span class="material-symbols-outlined text-2xl" data-icon="hub">hub</span>
<span class="text-xl font-bold tracking-tight text-blue-600 dark:text-blue-400">Tech Pulse</span>
</div>
<div class="flex items-center gap-4">
<button class="p-2 text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
<div class="w-8 h-8 rounded-full bg-surface-variant overflow-hidden border border-outline-variant">
<img alt="User profile avatar" class="w-full h-full object-cover" data-alt="A small, circular avatar image of a user profile. The image shows a close-up portrait of a professional looking individual against a neutral, light-mode suitable background. The lighting is bright and even, fitting the corporate, modern aesthetic of the application." src="https://lh3.googleusercontent.com/aida/ADBb0ujzLApOtVR6RCOD3kUMWzRg9ChcJVWfi9izUxkYweWtHqbVFzrfk_t-5CWbpxt__Juoex6YVLX-FBztuBCL-BmQQR9aomloxufxtXcHBpsgV_8udrdWNhxAhcm4L74xE-AipOKpiUpL1EEumJ4LQHJJu1I55yaNejt7-Q4-Pyq9HRLU2bDqDR5oQiUlrBB2-50xd5r1IcMxO052s_nYmKbME8U_AgCpQA0GbBVTiDGOGRYKhQm7lVIbpZQaVP8CajW2f8UGCaO2cg"/>
</div>
</div>
</div>
</header>
<!-- Main Content -->
<main class="pt-24 pb-xl px-lg md:px-xl max-w-3xl mx-auto">
<div class="mb-xl">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Create New Post</h1>
</div>
<form class="space-y-lg bg-surface-container-lowest p-lg md:p-xl rounded-xl shadow-sm border border-surface-variant">
<!-- Title Input -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface" for="post-title">Title</label>
<input class="w-full h-12 px-md bg-surface border border-outline-variant rounded-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow font-body-lg text-body-lg placeholder:text-on-surface-variant" id="post-title" placeholder="Enter post title" type="text"/>
</div>
<!-- Tags Input -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface" for="post-tags">Tags</label>
<input class="w-full h-12 px-md bg-surface border border-outline-variant rounded-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow font-body-lg text-body-lg placeholder:text-on-surface-variant" id="post-tags" placeholder="e.g. React, Web Development" type="text"/>
<p class="text-sm text-on-surface-variant mt-1">Add multiple tags by separating them with commas. Example: React, UI, DevTools.</p>
</div>
<!-- Content Rich Text Editor -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface" for="post-content">Content</label>
<!-- Editor Toolbar Mockup -->
<div class="border border-outline-variant border-b-0 rounded-t-lg bg-surface-container-low p-2 flex gap-2 flex-wrap items-center">
<button class="p-1.5 text-on-surface-variant hover:bg-surface-variant rounded transition-colors" type="button"><span class="material-symbols-outlined text-sm" data-icon="format_bold">format_bold</span></button>
<button class="p-1.5 text-on-surface-variant hover:bg-surface-variant rounded transition-colors" type="button"><span class="material-symbols-outlined text-sm" data-icon="format_italic">format_italic</span></button>
<button class="p-1.5 text-on-surface-variant hover:bg-surface-variant rounded transition-colors" type="button"><span class="material-symbols-outlined text-sm" data-icon="format_underlined">format_underlined</span></button>
<div class="w-px h-4 bg-outline-variant mx-1"></div>
<button class="p-1.5 text-on-surface-variant hover:bg-surface-variant rounded transition-colors" type="button"><span class="material-symbols-outlined text-sm" data-icon="format_list_bulleted">format_list_bulleted</span></button>
<button class="p-1.5 text-on-surface-variant hover:bg-surface-variant rounded transition-colors" type="button"><span class="material-symbols-outlined text-sm" data-icon="format_list_numbered">format_list_numbered</span></button>
<div class="w-px h-4 bg-outline-variant mx-1"></div>
<button class="p-1.5 text-on-surface-variant hover:bg-surface-variant rounded transition-colors" type="button"><span class="material-symbols-outlined text-sm" data-icon="link">link</span></button>
<button class="p-1.5 text-on-surface-variant hover:bg-surface-variant rounded transition-colors" type="button"><span class="material-symbols-outlined text-sm" data-icon="image">image</span></button>
</div>
<textarea class="w-full p-md bg-surface border border-outline-variant rounded-b-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow font-body-lg text-body-lg resize-y" id="post-content" rows="12"></textarea>
</div>
<!-- Submit Action -->
<div class="pt-md flex justify-end">
<button class="bg-primary text-on-primary font-label-md text-label-md h-12 px-xl rounded-lg hover:bg-primary-container hover:text-on-primary-container transition-colors shadow-sm flex items-center justify-center" type="button">
                    Submit Post
                </button>
</div>
</form>
</main>
</body></html>
