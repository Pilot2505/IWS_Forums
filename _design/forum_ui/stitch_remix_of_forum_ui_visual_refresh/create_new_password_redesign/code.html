<body class="bg-surface-container-low min-h-screen flex flex-col font-body-lg text-on-surface antialiased">
<!-- Top Navigation (Contextual suppression applied, minimal header for transactional flow) -->
<header class="w-full px-lg md:px-xl py-lg flex justify-between items-center fixed top-0 z-50">
<div class="font-headline-md text-primary tracking-tight">
            Tech Pulse
        </div>
<a class="font-label-md text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">
            Login
        </a>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-md py-xl sm:px-lg mt-[80px]">
<div class="w-full max-w-md">
<!-- Header Section -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-on-surface mb-base tracking-tight">Create New Password</h1>
<p class="font-body-lg text-on-surface-variant">Secure your account with a strong password.</p>
</div>
<!-- Card Section -->
<div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-lg md:p-xl flex flex-col gap-lg">
<!-- Form Content -->
<form class="flex flex-col gap-md">
<!-- New Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-on-surface" for="new-password">New Password</label>
<div class="relative">
<input class="w-full px-md py-[10px] rounded border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary font-body-lg text-on-surface placeholder:text-outline outline-none transition-colors" id="new-password" name="new-password" placeholder="Enter new password" type="password"/>
<button class="absolute inset-y-0 right-0 pr-md flex items-center font-label-md text-on-surface-variant hover:text-primary" type="button">
                                Show
                            </button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-on-surface" for="confirm-password">Confirm Password</label>
<input class="w-full px-md py-[10px] rounded border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary font-body-lg text-on-surface placeholder:text-outline outline-none transition-colors" id="confirm-password" name="confirm-password" placeholder="Confirm new password" type="password"/>
</div>
<!-- Helper Text -->
<p class="font-label-md text-on-surface-variant text-[13px] leading-[18px]">
                        Use at least 6 characters. After saving, you can sign in with your new password.
                    </p>
<!-- Action Button -->
<button class="mt-base w-full bg-primary text-on-primary font-label-md py-[12px] px-lg rounded flex items-center justify-center hover:bg-primary-container hover:text-on-primary-container transition-colors duration-200 active:scale-[0.98]" type="submit">
                        Update password
                    </button>
</form>
</div>
</div>
