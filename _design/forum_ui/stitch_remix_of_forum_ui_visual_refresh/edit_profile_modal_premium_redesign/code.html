    body {
      min-height: max(884px, 100dvh);

<body class="bg-background min-h-screen flex justify-center w-full antialiased font-body-md text-on-surface">
<!-- Background App View (Blurred/Dimmed) -->
<div class="fixed inset-0 z-0 bg-surface-container-lowest opacity-50 filter blur-sm flex flex-col max-w-[480px] mx-auto w-full border-x border-outline-variant/30">
<!-- Mock App Content just to give context to the blur -->
<header class="h-16 border-b border-outline-variant/30 flex items-center px-md justify-between">
<div class="w-8 h-8 rounded-full bg-surface-variant"></div>
<div class="w-24 h-4 rounded bg-surface-variant"></div>
<div class="w-8 h-8 rounded-full bg-surface-variant"></div>
</header>
<main class="flex-1 p-md space-y-md">
<div class="w-full h-32 rounded-lg bg-surface-variant"></div>
<div class="space-y-sm">
<div class="w-3/4 h-4 rounded bg-surface-variant"></div>
<div class="w-1/2 h-4 rounded bg-surface-variant"></div>
</div>
<div class="w-full h-48 rounded-lg bg-surface-variant"></div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-md bg-on-surface/40 backdrop-blur-sm">
<!-- Modal Container (Mobile constraints) -->
<div class="w-full max-w-[400px] bg-surface-container-lowest rounded-xl shadow-xl overflow-hidden flex flex-col relative max-h-[795px]">
<!-- Close Button -->
<button aria-label="Close modal" class="absolute top-md right-md text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<!-- Scrollable Content -->
<div class="p-lg overflow-y-auto flex-1 custom-scrollbar">
<!-- Avatar & Header Section -->
<div class="flex flex-col items-center mb-lg pt-sm">
<div class="w-24 h-24 rounded-full overflow-hidden border-4 border-surface-container-lowest shadow-sm mb-sm relative group cursor-pointer">
<img alt="Profile Avatar" class="w-full h-full object-cover" data-alt="A close-up portrait of a professional individual serving as a user profile avatar. The subject is well-lit against a neutral background. The overall aesthetic is modern, clean, and aligns with a professional corporate design system emphasizing clarity and a refined slate color palette." src="https://lh3.googleusercontent.com/aida/ADBb0uismdaErg7rlHpBCtUTYktIN_5RsNoSCpyoWo16PaI8o8gFkXee3U1aHN-524lyTUamkIFFAV_unQ8wkWJ6a5jjYf4IpJqrTYIgPwAxzERnxAI3wPdnfd1ZTxW_FCaTwDw0pMm0BdZL-Yz9p-f13cNppQcr9lqdsYaz9P-kxc5UQuAOC4o6bfOAZ9cRMQoKv0G5yXn-YK1BR1d9eZXzguTpXvg7SDj6ZN1xLmgtX2OA8Lplzy9BbnDVnRY60JHXug37iuONa_fS"/>
<div class="absolute inset-0 bg-primary/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-surface-container-lowest">photo_camera</span>
</div>
</div>
<button class="font-button text-button text-secondary-container hover:text-secondary transition-colors mb-md">
                        Change Image
                    </button>
<h2 class="font-h2 text-h2 text-on-surface">Edit Profile</h2>
</div>
<!-- Form Fields -->
<form class="space-y-md">
<!-- Fullname -->
<div class="flex flex-col space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="fullname">Fullname</label>
<input class="w-full bg-surface rounded-lg border border-outline-variant px-md py-[10px] font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container/20 transition-all placeholder:text-on-surface-variant/50" id="fullname" type="text" value="Alex Rivera"/>
</div>
<!-- Email -->
<div class="flex flex-col space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email</label>
<input class="w-full bg-surface rounded-lg border border-outline-variant px-md py-[10px] font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container/20 transition-all placeholder:text-on-surface-variant/50" id="email" type="email" value="alex.rivera@example.com"/>
</div>
<!-- Username -->
<div class="flex flex-col space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="username">Username</label>
<div class="relative flex items-center">
<span class="absolute left-md text-on-surface-variant/60 font-body-md text-body-md">@</span>
<input class="w-full bg-surface rounded-lg border border-outline-variant pl-8 pr-md py-[10px] font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container/20 transition-all placeholder:text-on-surface-variant/50" id="username" type="text" value="arivera_dev"/>
</div>
</div>
<!-- Bio -->
<div class="flex flex-col space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="bio">Bio</label>
<textarea class="w-full bg-surface rounded-lg border border-outline-variant px-md py-[10px] font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container/20 transition-all resize-none placeholder:text-on-surface-variant/50" id="bio" rows="3">Senior Systems Engineer focused on scalable infrastructure and performance optimization. Passionate about mentoring and open source.</textarea>
</div>
</form>
</div>
<!-- Action Buttons Footer -->
<div class="p-md border-t border-surface-container bg-surface-container-lowest flex flex-col space-y-sm">
<button class="w-full bg-primary text-on-primary font-button text-button py-[12px] rounded-lg hover:bg-on-surface transition-colors">
                    Save Changes
                </button>
<button class="w-full bg-transparent border border-outline-variant text-on-surface font-button text-button py-[12px] rounded-lg hover:bg-surface transition-colors">
                    Cancel
                </button>
</div>
</div>
</div>
<!-- Inject BottomNavBar to suppress errors if expected by test environment, but keep hidden as per "Destination Rule" since this is a modal/transactional state -->
<div class="hidden">
<div class="fixed bottom-0 left-0 w-full bg-white dark:bg-slate-950 flex justify-around items-center px-4 h-16 pb-safe">
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-600 pt-2"><span class="material-symbols-outlined">forum</span><span>Feed</span></div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-600 pt-2"><span class="material-symbols-outlined">search</span><span>Search</span></div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-600 pt-2"><span class="material-symbols-outlined">terminal</span><span>Topics</span></div>
<div class="flex flex-col items-center justify-center text-slate-900 dark:text-slate-50 font-bold border-t-2 border-slate-900 dark:border-slate-50 pt-2"><span class="material-symbols-outlined">person</span><span>Profile</span></div>
</div>
</div>
</body></html>
